<svg width="2000" height="680" viewBox="0 0 2000 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ajan-sql cover</title>
  <desc id="desc">Dark cover with centered white title, gray supporting text, and subtle diagonal stripe texture</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151618"/>
      <stop offset="1" stop-color="#1A1C20"/>
    </linearGradient>

    <pattern id="diag" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="rotate(34)">
      <line x1="0" y1="0" x2="0" y2="44" stroke="#2A2D31" stroke-width="3"/>
    </pattern>
  </defs>

  <rect width="2000" height="680" fill="url(#bg)"/>
  <rect width="2000" height="680" fill="url(#diag)" opacity="0.4"/>

  <g font-family="Manrope, Segoe UI, sans-serif" text-anchor="middle">
    <text x="1000" y="240" fill="#F5F5F5" font-size="145" font-weight="800" letter-spacing="0.2">ajan-sql</text>
    <text fill="#6B6E73" font-size="64" font-weight="500" letter-spacing="0.2">
      <tspan x="1000" y="368">AI-safe MCP server for schema-aware,</tspan>
      <tspan x="1000" dy="78">read-only SQL access</tspan>
    </text>
    <text x="1000" y="542" fill="#3A3D42" font-size="54" font-weight="700" letter-spacing="0.2">Built for LLM and AI workflows</text>
  </g>
</svg>
